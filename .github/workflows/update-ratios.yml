name: Update TIPS index ratios

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch index ratios
        run: python fetch_index_ratios.py

      - name: Commit and push if changed
        run: |
          git config user.name "tips-ladder-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index_ratios.json
          git diff --staged --quiet && exit 0
          git commit -m "Update TIPS index ratios"
          git pull --rebase origin main
          git push
